# =====================================================
# Full managed example: gateway + auth + registry in one file
# =====================================================
#
# For a from-zero managed deployment on one host: this includes the
# workspace gateway, registry database, OAuth front door, and the MCP
# streamable-HTTP wrapper. The gateway starts official `lightrag-server`
# child processes on demand for each workspace, so there is no separate
# long-lived `lightrag` service in this file.
#
# This is the most explicit version of the managed backend stack. It is
# similar to docker-compose.yml, but keeps all required LightRAG provider
# variables and gateway-specific comments together in one file for
# first-time self-hosters.
#
# REQUIRES:
#   - A domain (DOMAIN below) with an A/AAAA record pointing at this host
#   - Ports 80 and 443 open and free on this host
#   - LLM + embedding provider config for LightRAG child processes
#
# ENV VARS — copy .env.example to .env and fill in:
#   DOMAIN, LIGHTRAG_API_KEY, LIGHTRAG_SERVER_KEY, WORKSPACE_KEY_PEPPER,
#   POSTGRES_PASSWORD, MCP_AUTH_PASSWORD,
#   LLM_BINDING, LLM_MODEL, LLM_BINDING_API_KEY,
#   EMBEDDING_BINDING, EMBEDDING_MODEL, EMBEDDING_BINDING_API_KEY
# Optional passthrough vars:
#   LLM_BINDING_HOST, EMBEDDING_BINDING_HOST, POSTGRES_USER, POSTGRES_DB,
#   MCP_GIT_REF
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lightrag-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lightrag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-lightrag}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  lightrag-gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: lightrag-gateway
    environment:
      - PORT=9621
      - POSTGRES_USER=${POSTGRES_USER:-lightrag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DB:-lightrag}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - WORKSPACE_KEY_PEPPER=${WORKSPACE_KEY_PEPPER}
      - LIGHTRAG_ADMIN_KEY=${LIGHTRAG_API_KEY}
      - LIGHTRAG_SERVER_KEY=${LIGHTRAG_SERVER_KEY}
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs
      - WORKSPACE_FIRST_PORT=9700
      - WORKSPACE_MAX_ACTIVE=16
      - LLM_BINDING=${LLM_BINDING}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BINDING_HOST=${LLM_BINDING_HOST:-}
      - LLM_BINDING_API_KEY=${LLM_BINDING_API_KEY}
      - EMBEDDING_BINDING=${EMBEDDING_BINDING}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_BINDING_HOST=${EMBEDDING_BINDING_HOST:-}
      - EMBEDDING_BINDING_API_KEY=${EMBEDDING_BINDING_API_KEY}
    volumes:
      - workspace-storage:/app/data/rag_storage
      - workspace-inputs:/app/data/inputs
    depends_on:
      - postgres
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: lightrag-mcp-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - lightrag-mcp-caddy-data:/data
    depends_on:
      - lightrag-mcp-auth
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  lightrag-mcp-gw:
    build:
      context: ./mcp-gw
    container_name: lightrag-mcp-gw
    command:
      - "--stdio"
      - "uvx --from git+https://github.com/alexbic/lightrag-mcp-connect.git@${MCP_GIT_REF:-v2.0.0} lightrag-mcp-connect"
      - "--outputTransport"
      - "streamableHttp"
      - "--port"
      - "8000"
      - "--streamableHttpPath"
      - "/mcp"
      # NOT --stateful — see docker-compose.yml's comment on the same
      # lines for why (supercorp-ai/supergateway#67).
    environment:
      - LIGHTRAG_GATEWAY_URL=http://lightrag-gateway:9621
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY}
      - LIGHTRAG_MCP_CONTENT_DB=/data/content.sqlite3
    volumes:
      - lightrag-mcp-content:/data
    networks:
      - lightrag-mcp-net
    depends_on:
      - lightrag-gateway
    restart: unless-stopped

  lightrag-mcp-auth:
    image: ghcr.io/sigbit/mcp-auth-proxy:latest
    container_name: lightrag-mcp-auth
    command:
      - "--external-url=https://${DOMAIN}"
      - "--no-auto-tls"   # Caddy terminates TLS; this listens plain HTTP
      - "http://lightrag-mcp-gw:8000"
    environment:
      - PASSWORD=${MCP_AUTH_PASSWORD}
      # AUTH_HMAC_SECRET / JWT_PRIVATE_KEY intentionally not set — see
      # docker-compose.yml's comment on the same lines for why.
    volumes:
      - lightrag-mcp-auth-data:/data
    networks:
      - lightrag-mcp-net
    depends_on:
      - lightrag-mcp-gw
    restart: unless-stopped

volumes:
  postgres-data:
  workspace-storage:
  workspace-inputs:
  lightrag-mcp-auth-data:
  lightrag-mcp-caddy-data:
  lightrag-mcp-content:

networks:
  lightrag-mcp-net:
