# =====================================================
# Managed backend mode: remote MCP access through the workspace gateway
# =====================================================
#
# Deploys the public managed stack from this repository:
#   claude.ai / Claude Desktop / Claude Code / mobile app
#     --> https://${DOMAIN}/...   (Caddy: automatic HTTPS via Let's Encrypt,
#                                  rewrites one HTTP header — see Caddyfile)
#     --> lightrag-mcp-auth :80   (OAuth 2.1 — one-time password login,
#                                  then Claude manages its own tokens)
#     --> lightrag-mcp-gw :8000/mcp (private network only)
#     --> lightrag-mcp-connect   (stdio, installed via uvx-from-git)
#     --> lightrag-gateway       (workspace routing, admin/key registry)
#     --> managed lightrag-server child processes per workspace
#
# REQUIRES:
#   - A domain (DOMAIN below) with an A/AAAA record pointing at this host
#   - Ports 80 and 443 open and free on this host (Caddy needs both for
#     Let's Encrypt HTTP-01 and HTTPS)
#   - LLM + embedding provider config for LightRAG child processes
#
# Already running Traefik in front of other services on this host? Use
# docker-compose.traefik.yml instead — see README.md.
#
# ENV VARS — copy .env.example to .env and fill in:
#   DOMAIN, LIGHTRAG_API_KEY, LIGHTRAG_SERVER_KEY, WORKSPACE_KEY_PEPPER,
#   POSTGRES_PASSWORD, MCP_AUTH_PASSWORD, LLM_*, EMBEDDING_*
# (POSTGRES_USER, POSTGRES_DB, MCP_GIT_REF are optional)
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lightrag-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lightrag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-lightrag}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  lightrag-gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: lightrag-gateway
    environment:
      - PORT=9621
      - POSTGRES_USER=${POSTGRES_USER:-lightrag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DB:-lightrag}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - WORKSPACE_KEY_PEPPER=${WORKSPACE_KEY_PEPPER}
      - LIGHTRAG_ADMIN_KEY=${LIGHTRAG_API_KEY}
      - LIGHTRAG_SERVER_KEY=${LIGHTRAG_SERVER_KEY}
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs
      - WORKSPACE_FIRST_PORT=9700
      - WORKSPACE_MAX_ACTIVE=16
      - LLM_BINDING=${LLM_BINDING}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BINDING_HOST=${LLM_BINDING_HOST:-}
      - LLM_BINDING_API_KEY=${LLM_BINDING_API_KEY}
      - EMBEDDING_BINDING=${EMBEDDING_BINDING}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_BINDING_HOST=${EMBEDDING_BINDING_HOST:-}
      - EMBEDDING_BINDING_API_KEY=${EMBEDDING_BINDING_API_KEY}
    volumes:
      - workspace-storage:/app/data/rag_storage
      - workspace-inputs:/app/data/inputs
    depends_on:
      - postgres
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: lightrag-mcp-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - lightrag-mcp-caddy-data:/data
    depends_on:
      - lightrag-mcp-auth
    networks:
      - lightrag-mcp-net
    restart: unless-stopped

  # =====================================================
  # MCP Gateway (internal only — never exposed directly)
  # Wraps the stdio-only lightrag-mcp-connect bridge in supergateway and
  # exposes it as streamable-HTTP on the internal network.
  # =====================================================
  lightrag-mcp-gw:
    build:
      context: ./mcp-gw
    container_name: lightrag-mcp-gw
    command:
      - "--stdio"
      - "uvx --from git+https://github.com/alexbic/lightrag-mcp-connect.git@${MCP_GIT_REF:-v2.0.0} lightrag-mcp-connect"
      - "--outputTransport"
      - "streamableHttp"
      - "--port"
      - "8000"
      - "--streamableHttpPath"
      - "/mcp"
      # NOT --stateful: Claude's client doesn't reliably resend the
      # Mcp-Session-Id header supergateway's stateful mode requires on
      # every request after initialize (confirmed against a live claude.ai
      # connector; matches upstream issue supercorp-ai/supergateway#67,
      # "Not stable session for custom SSE and Claude"). Stateless spawns
      # a fresh child process per request instead of tracking sessions —
      # a bit more latency per call, but this whole bug class can't happen.
    environment:
      - LIGHTRAG_GATEWAY_URL=http://lightrag-gateway:9621
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY}
      - LIGHTRAG_MCP_CONTENT_DB=/data/content.sqlite3
    volumes:
      - lightrag-mcp-content:/data
    networks:
      - lightrag-mcp-net
    depends_on:
      - lightrag-gateway
    restart: unless-stopped

  # =====================================================
  # MCP Auth Proxy — OAuth 2.1 front door for lightrag-mcp-gw
  # https://github.com/sigbit/mcp-auth-proxy, verified with Claude
  # Web/Desktop/Code. Handles Dynamic Client Registration, PKCE,
  # discovery (RFC 9728/8414) — no manual Client ID/Secret needed in
  # claude.ai's "Add custom connector" dialog, just the URL.
  # =====================================================
  lightrag-mcp-auth:
    image: ghcr.io/sigbit/mcp-auth-proxy:latest
    container_name: lightrag-mcp-auth
    command:
      - "--external-url=https://${DOMAIN}"
      - "--no-auto-tls"   # Caddy terminates TLS; this listens plain HTTP
      - "http://lightrag-mcp-gw:8000"
    environment:
      - PASSWORD=${MCP_AUTH_PASSWORD}
      # AUTH_HMAC_SECRET / JWT_PRIVATE_KEY are deliberately NOT set here:
      # mcp-auth-proxy auto-generates and persists both under /data on
      # first start, and reuses them on every subsequent restart as long
      # as the volume survives — so no OAuth sessions get invalidated by
      # a redeploy. (If you set these as env vars instead, keep them on
      # ONE line each — some platforms split multi-line env values into
      # separate bogus entries and silently truncate JWT_PRIVATE_KEY.)
    volumes:
      - lightrag-mcp-auth-data:/data
    networks:
      - lightrag-mcp-net
    depends_on:
      - lightrag-mcp-gw
    restart: unless-stopped

volumes:
  postgres-data:
  workspace-storage:
  workspace-inputs:
  lightrag-mcp-auth-data:
  lightrag-mcp-caddy-data:
  lightrag-mcp-content:

networks:
  lightrag-mcp-net:
