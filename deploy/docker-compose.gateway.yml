# =====================================================
# Gateway mode: MCP → workspace gateway → LightRAG (multi-tenant)
# =====================================================
#
# Workspace-aware mode — MCP server routes requests through the
# workspace gateway, which validates keys and routes to isolated workspaces.
# Multiple tenants, isolated knowledge bases, admin management tools.
#
# Use this when:
# - You need multi-tenancy (multiple isolated workspaces)
# - You want to manage access controls per workspace
# - You need admin tools to create workspaces and manage keys
#
# ENV VARS (set in .env or pass via docker run):
#   LIGHTRAG_GATEWAY_URL — Gateway URL (default: http://lightrag-gateway:9621)
#   LIGHTRAG_API_KEY — Superadmin key (imported as gateway admin, sees all workspaces)
#   LIGHTRAG_SERVER_KEY — LightRAG internal key (gateway → LightRAG, keep secret)
#   WORKSPACE_KEY_PEPPER — Pepper for workspace key hashing (generate one, keep secret)
#   LIGHTRAG_ADMIN_KEY — Removed. Admin status is a flag in the registry;
#                         LIGHTRAG_API_KEY is bootstrapped as the admin key.
#   POSTGRES_* — PostgreSQL connection (for workspace registry)
#   LIGHTRAG_FILE_PATH_ROOT — Optional root for file_path uploads
#   LIGHTRAG_MCP_CONNECTION_MODE — Optional instruction mode (`remote` recommended here)
#   LIGHTRAG_MCP_INSTRUCTIONS_DIR — Optional directory with prefixed instruction files
#   LIGHTRAG_MCP_INSTRUCTIONS_PROFILE — Optional explicit instruction profile override
#
# To start: docker compose -f docker-compose.gateway.yml up -d
#
# Admin workflow:
#   1. Connect with LIGHTRAG_API_KEY (superadmin) → sees all workspaces + admin tools
#   2. Use create_workspace(name="myproject") → returns api_key
#   3. Share api_key with collaborators → they see only that workspace
#   4. Use issue_key/revoke_key/rotate_key to manage keys
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lightrag-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lightrag}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-lightrag}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  lightrag-gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: lightrag-gateway
    environment:
      # Gateway configuration
      - PORT=9621
      - WORKSPACE_DATABASE_URL=postgresql://${POSTGRES_USER:-lightrag}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lightrag}
      - WORKSPACE_KEY_PEPPER=${WORKSPACE_KEY_PEPPER}
      # Import the operator's env key as superadmin
      - LIGHTRAG_ADMIN_KEY=${LIGHTRAG_API_KEY}
      # LightRAG internal key (gateway → child LightRAG instances)
      - LIGHTRAG_SERVER_KEY=${LIGHTRAG_SERVER_KEY}
      # Workspace storage paths
      - WORKING_DIR=/app/data/rag_storage
      - INPUT_DIR=/app/data/inputs
      - WORKSPACE_FIRST_PORT=9700
      - WORKSPACE_MAX_ACTIVE=16
      # LightRAG child process provider configuration
      - LLM_BINDING=${LLM_BINDING}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BINDING_HOST=${LLM_BINDING_HOST:-}
      - LLM_BINDING_API_KEY=${LLM_BINDING_API_KEY}
      - EMBEDDING_BINDING=${EMBEDDING_BINDING}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_BINDING_HOST=${EMBEDDING_BINDING_HOST:-}
      - EMBEDDING_BINDING_API_KEY=${EMBEDDING_BINDING_API_KEY}
    volumes:
      - workspace-storage:/app/data/rag_storage
      - workspace-inputs:/app/data/inputs
    depends_on:
      - postgres
    restart: unless-stopped

  lightrag-mcp:
    build:
      context: ..
      dockerfile: mcp/Dockerfile
    container_name: lightrag-mcp
    environment:
      # Gateway mode: route through workspace gateway
      - LIGHTRAG_GATEWAY_URL=http://lightrag-gateway:9621
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY}
      # Optional: file_path uploads from a trusted local directory
      - LIGHTRAG_FILE_PATH_ROOT=${LIGHTRAG_FILE_PATH_ROOT:-}
      # Optional: profile-specific instructions injected at handshake
      - LIGHTRAG_MCP_CONNECTION_MODE=${LIGHTRAG_MCP_CONNECTION_MODE:-remote}
      - LIGHTRAG_MCP_INSTRUCTIONS_DIR=${LIGHTRAG_MCP_INSTRUCTIONS_DIR:-}
      - LIGHTRAG_MCP_INSTRUCTIONS_PROFILE=${LIGHTRAG_MCP_INSTRUCTIONS_PROFILE:-}
      - LIGHTRAG_MCP_INSTRUCTIONS_FILE=${LIGHTRAG_MCP_INSTRUCTIONS_FILE:-}
    depends_on:
      - lightrag-gateway
    restart: unless-stopped

volumes:
  postgres-data:
  workspace-storage:
  workspace-inputs:

networks:
  default:
    name: lightrag-mcp-net
